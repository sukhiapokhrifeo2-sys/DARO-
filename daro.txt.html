<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARO - CMD Edition</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid #00ff00;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }
        h1, h2 {
            text-align: center;
            text-transform: uppercase;
            border-bottom: 1px dashed #00ff00;
            padding-bottom: 10px;
        }
        .screen-section {
            margin-bottom: 20px;
        }
        .input-area {
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        label {
            font-weight: bold;
        }
        input[type="password"], input[type="text"] {
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 5px 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            outline: none;
            width: 150px;
        }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 6px 15px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        button:hover {
            background: #00cc00;
        }
        .game-cols {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 20px;
        }
        .player-box {
            flex: 1;
            border: 1px solid #00ff00;
            padding: 10px;
            min-height: 150px;
        }
        .history-list {
            list-style-type: none;
            padding: 0;
            margin: 10px 0 0 0;
        }
        .history-list li {
            padding: 3px 0;
            border-bottom: 1px solid #113311;
        }
        #winHistory {
            margin-top: 20px;
            border-top: 1px dashed #00ff00;
            padding-top: 10px;
        }
        .status-msg {
            color: #ffff00;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>= DARO SYSTEM v1.0 =</h1>
    
    <div id="setupPhase" class="screen-section">
        <h2>[ PHASE 1: LOCK NUMBERS ]</h2>
        <div class="input-area" id="p1LockArea">
            <label>Player 1, lock your 4-digit number:</label>
            <input type="password" id="p1Secret" maxlength="4" placeholder="****">
            <button onclick="lockNumber(1)">Lock</button>
        </div>
        <div class="input-area" id="p2LockArea" style="display: none;">
            <label>Player 2, lock your 4-digit number:</label>
            <input type="password" id="p2Secret" maxlength="4" placeholder="****">
            <button onclick="lockNumber(2)">Lock</button>
        </div>
        <div id="setupStatus" class="status-msg">Waiting for Player 1...</div>
    </div>

    <div id="playPhase" class="screen-section" style="display: none;">
        <h2>[ PHASE 2: GUESSING ]</h2>
        <div id="turnIndicator" style="font-weight: bold; margin-bottom: 15px;"></div>
        
        <div class="input-area">
            <label id="guessLabel">Your Guess:</label>
            <input type="text" id="currentGuess" maxlength="4" placeholder="1234">
            <button onclick="submitGuess()">Submit Guess</button>
        </div>

        <div class="game-cols">
            <div class="player-box">
                <h3>PLAYER 1 GUESSES</h3>
                <ul id="p1History" class="history-list"></ul>
            </div>
            <div class="player-box">
                <h3>PLAYER 2 GUESSES</h3>
                <ul id="p2History" class="history-list"></ul>
            </div>
        </div>
    </div>

    <div id="winHistory">
        <h3>[ MATCH WIN HISTORY ]</h3>
        <ul id="winList" class="history-list"></ul>
    </div>
</div>

<script>
    // Game State variables
    let p1Secret = "";
    let p2Secret = "";
    let currentPlayer = 1; // 1 or 2
    let winHistory = [];

    // Validates if input is exactly 4 digits
    function isValid4Digits(num) {
        return /^\d{4}$/.test(num);
    }

    // Phase 1: Locking the secrets
    function lockNumber(player) {
        if (player === 1) {
            const val = document.getElementById("p1Secret").value;
            if (!isValid4Digits(val)) {
                alert("ERROR: Input must be exactly 4 digits.");
                return;
            }
            p1Secret = val;
            document.getElementById("p1LockArea").style.display = "none";
            document.getElementById("p2LockArea").style.display = "flex";
            document.getElementById("setupStatus").innerText = "Waiting for Player 2...";
        } else {
            const val = document.getElementById("p2Secret").value;
            if (!isValid4Digits(val)) {
                alert("ERROR: Input must be exactly 4 digits.");
                return;
            }
            p2Secret = val;
            startPlaying();
        }
    }

    // Switch to Guessing Phase
    function startPlaying() {
        document.getElementById("setupPhase").style.display = "none";
        document.getElementById("playPhase").style.display = "block";
        currentPlayer = 1;
        updateTurnUI();
    }

    function updateTurnUI() {
        document.getElementById("turnIndicator").innerText = `CURRENT TURN: PLAYER ${currentPlayer}`;
        document.getElementById("guessLabel").innerText = `Player ${currentPlayer} Guess:`;
        document.getElementById("currentGuess").value = "";
        document.getElementById("currentGuess").focus();
    }

    // Phase 2: Processing Guesses
    function submitGuess() {
        const guessInput = document.getElementById("currentGuess");
        const guess = guessInput.value;

        if (!isValid4Digits(guess)) {
            alert("ERROR: Guess must be exactly 4 digits.");
            return;
        }

        // Player 1 tries to guess Player 2's secret, and vice-versa
        const targetSecret = (currentPlayer === 1) ? p2Secret : p1Secret;
        
        let correctCount = 0;
        for (let i = 0; i < 4; i++) {
            if (guess[i] === targetSecret[i]) {
                correctCount++;
            }
        }

        let feedbackText = "";
        let isWin = false;

        if (correctCount === 4) {
            feedbackText = "4 digits correct! WINNER!";
            isWin = true;
        } else if (correctCount > 0) {
            feedbackText = `${correctCount} digit${correctCount > 1 ? 's' : ''} correct`;
        } else {
            feedbackText = "Try again";
        }

        // Record guess in history UI
        const historyList = document.getElementById(`p${currentPlayer}History`);
        const entry = document.createElement("li");
        entry.innerText = `Guess: ${guess} -> ${feedbackText}`;
        historyList.appendChild(entry);

        if (isWin) {
            alert(`PLAYER ${currentPlayer} WINS THE GAME!`);
            recordWin(currentPlayer);
            resetGame();
            return;
        } else {
            alert(feedbackText);
        }

        // Alternate Turns
        currentPlayer = (currentPlayer === 1) ? 2 : 1;
        updateTurnUI();
    }

    // Record the victory and update persistent layout
    function recordWin(player) {
        winHistory.push(`Player ${player}`);
        const winList = document.getElementById("winList");
        const entry = document.createElement("li");
        entry.innerText = `Match ${winHistory.length}: Player ${player} won`;
        winList.appendChild(entry);
    }

    // Reset loop back to phase 1
    function resetGame() {
        p1Secret = "";
        p2Secret = "";
        document.getElementById("p1Secret").value = "";
        document.getElementById("p2Secret").value = "";
        document.getElementById("p1History").innerHTML = "";
        document.getElementById("p2History").innerHTML = "";
        
        document.getElementById("setupPhase").style.display = "block";
        document.getElementById("p1LockArea").style.display = "flex";
        document.getElementById("p2LockArea").style.display = "none";
        document.getElementById("setupStatus").innerText = "Waiting for Player 1...";
        
        document.getElementById("playPhase").style.display = "none";
    }
</script>

</body>
</html>
